<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1A0A"/>
      <stop offset="100%" style="stop-color:#1A3A1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8622A"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Saffron circle accent -->
  <circle cx="256" cy="220" r="160" fill="none" stroke="url(#accent)" stroke-width="8" opacity="0.3"/>
  <!-- Yoga pose figure (seated meditation - simple stick figure) -->
  <!-- Head -->
  <circle cx="256" cy="130" r="38" fill="url(#accent)"/>
  <!-- Body seated cross-legged -->
  <ellipse cx="256" cy="240" rx="70" ry="55" fill="url(#accent)"/>
  <!-- Left knee -->
  <ellipse cx="175" cy="295" rx="32" ry="18" fill="url(#accent)" transform="rotate(-15,175,295)"/>
  <!-- Right knee -->
  <ellipse cx="337" cy="295" rx="32" ry="18" fill="url(#accent)" transform="rotate(15,337,295)"/>
  <!-- Left arm raised -->
  <ellipse cx="192" cy="205" rx="16" ry="48" fill="url(#accent)" transform="rotate(20,192,205)"/>
  <!-- Right arm raised -->
  <ellipse cx="320" cy="205" rx="16" ry="48" fill="url(#accent)" transform="rotate(-20,320,205)"/>
  <!-- App name -->
  <text x="256" y="390" text-anchor="middle" font-size="46" fill="white" font-family="Arial, sans-serif" font-weight="bold" opacity="0.9">YogaPath</text>
  <text x="256" y="435" text-anchor="middle" font-size="28" fill="url(#accent)" font-family="Arial, sans-serif" font-weight="bold" letter-spacing="1">UTTARAKHAND</text>
</svg>
